name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # 1. Validate all registry packs (remote sources + any local packs)
  # -------------------------------------------------------------------
  validate-schemas:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate all registry packs
        run: python tools/validate.py

  # -------------------------------------------------------------------
  # 2. OPA tests — only for local packs in packages/
  #    Remote packs (agt-policies-nigeria) are tested in their own repo.
  # -------------------------------------------------------------------
  opa-tests:
    name: OPA Tests (local packs only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for local policy packs
        id: check_packs
        run: |
          COUNT=$(find packages -name "policy.rego" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Local packs with Rego: $COUNT"

      - name: Install OPA
        if: steps.check_packs.outputs.count > 0
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Check OPA syntax
        if: steps.check_packs.outputs.count > 0
        run: |
          find packages -name "*.rego" | while read f; do
            opa check "$f" || exit 1
          done

      - name: Run OPA tests
        if: steps.check_packs.outputs.count > 0
        run: |
          find packages -name "policy.rego" | while read policy; do
            dir=$(dirname "$policy")
            testdir="$dir/tests"
            if [ -d "$testdir" ]; then
              echo "Testing $dir ..."
              opa test "$policy" "$testdir/" -v || exit 1
            fi
          done

  # -------------------------------------------------------------------
  # 3. Regal lint — only for local packs
  # -------------------------------------------------------------------
  regal-lint:
    name: Regal Lint (local packs only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for local Rego files
        id: check_rego
        run: |
          COUNT=$(find packages -name "*.rego" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Install Regal
        if: steps.check_rego.outputs.count > 0
        run: |
          curl -L -o /usr/local/bin/regal \
            https://github.com/StyraInc/regal/releases/latest/download/regal_Linux_x86_64
          chmod +x /usr/local/bin/regal
          regal version

      - name: Lint local Rego policies
        if: steps.check_rego.outputs.count > 0
        run: regal lint packages/

  # -------------------------------------------------------------------
  # 4. Check every local pack has a meta.json
  # -------------------------------------------------------------------
  meta-check:
    name: meta.json Check (local packs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every local pack has meta.json
        run: |
          FAIL=0
          for policy_yaml in $(find packages -name "policy.yaml" 2>/dev/null); do
            dir=$(dirname "$policy_yaml")
            if [ ! -f "$dir/meta.json" ]; then
              echo "MISSING meta.json: $dir"
              FAIL=1
            fi
          done
          exit $FAIL

  # -------------------------------------------------------------------
  # 5. registry.json integrity check
  # -------------------------------------------------------------------
  registry-check:
    name: Registry Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check registry.json is valid JSON
        run: python -c "import json; json.load(open('registry.json')); print('registry.json is valid JSON')"

      - name: Check all registry source URLs are reachable
        run: |
          python3 << 'EOF'
          import json, urllib.request, sys
          registry = json.load(open("registry.json"))
          fail = 0
          for pack in registry["packs"]:
              url = pack.get("source_yaml")
              if not url:
                  continue
              try:
                  req = urllib.request.Request(url, method="HEAD")
                  urllib.request.urlopen(req, timeout=10)
                  print(f"  ✓  {pack['id']}")
              except Exception as e:
                  print(f"  ✗  {pack['id']}: {e}")
                  fail += 1
          sys.exit(fail)
          EOF
