name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Python package tests + coverage ──────────────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install comply54 + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ --cov=comply54 --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python
          name: comply54-python
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. TypeScript package tests ──────────────────────────────────────────────
  typescript:
    name: TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/core/package-lock.json

      - name: Install dependencies
        working-directory: packages/core
        run: npm ci --prefer-offline || npm install

      - name: Type check
        working-directory: packages/core
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/core
        run: npx vitest run --reporter=verbose

  # ── 3. Rego syntax check (bundled packs) ────────────────────────────────────
  rego:
    name: Rego Policy Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Check Rego syntax — all bundled packs
        run: |
          find comply54/packs -name "*.rego" | while read f; do
            opa check "$f" || exit 1
            echo "  ✓  $f"
          done

      - name: Run Rego tests (if any _test.rego files present)
        run: |
          COUNT=$(find comply54/packs -name "*_test.rego" | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            opa test comply54/packs/ -v
          else
            echo "No _test.rego files found — skipping OPA test runner"
          fi

  # ── 4. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check comply54/ tests/

  # ── 5. Registry integrity ────────────────────────────────────────────────────
  registry:
    name: Registry Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate registry.json is valid JSON
        run: python3 -c "import json; json.load(open('registry.json')); print('✓ registry.json valid')"
